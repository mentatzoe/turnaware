name: Release

# Build distributions on any v* tag and, when a PyPI token is configured,
# publish them. TurnAware is stdlib-only, so the build needs no extra wheels.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install the build frontend
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload distributions as a workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: turnaware-dist
          path: dist/*
          if-no-files-found: error
      # Detect the PyPI token in an isolated step so only this step and the
      # publish step ever see it -- the build steps above never do (the
      # `secrets` context is also not allowed directly in a step `if:`).
      - name: Check for a PyPI token
        id: check_pypi
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "${PYPI_API_TOKEN:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      # Publish only when the token is configured; absence leaves the build
      # green (tagging always yields the dist artifact). Consider PyPI Trusted
      # Publishing (OIDC) later to drop the long-lived token entirely.
      - name: Publish to PyPI
        if: steps.check_pypi.outputs.present == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
