name: Release

# Build distributions on any v* tag and, when a PyPI token is configured,
# publish them. TurnAware is stdlib-only, so the build needs no extra wheels.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the build frontend
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload distributions as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnaware-dist
          path: dist/*
          if-no-files-found: error
      # Publish only when a PyPI token secret is configured. The absence of the
      # secret leaves the build green: tagging always yields artifacts, and
      # publishing is opt-in via the PYPI_API_TOKEN repository secret.
      - name: Publish to PyPI
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
