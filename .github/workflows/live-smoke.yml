name: live-smoke

# MANUAL ONLY. Makes a real provider call (it costs money), so it never runs on
# push or pull_request -- only when a maintainer dispatches it. It is the drift
# detector: run it at release time, or when a provider/model regression is
# suspected, to confirm the configured model still returns a usable verdict.
# If the OPENROUTER_API_KEY secret is not set, the job skips cleanly (exit 0).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    name: live provider smoke (manual)
    runs-on: ubuntu-latest
    env:
      TURNAWARE_CLASSIFIER_MODEL: google/gemini-3.1-flash-lite
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install TurnAware
        run: pip install .
      - name: One real admit call, assert a verdict is returned
        # Secret scoped to this step only, so the install step never sees it.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "No OPENROUTER_API_KEY secret -- skipping live smoke."
            exit 0
          fi
          echo "Live smoke: model=${TURNAWARE_CLASSIFIER_MODEL}, fixture=tests/fixtures/speak.json"
          turnaware admit --input tests/fixtures/speak.json \
            | python -c 'import json,sys; r=json.load(sys.stdin); assert "verdict" in r, "no verdict in result"; print("live smoke OK: verdict=%s model=%s" % (r["verdict"], r.get("classifier_model")))'
