name: eval

# Weekly (and on-demand) drift detector: runs the full adversarial corpus
# against the live model and reports accuracy / headline cases. It makes real
# provider calls, so it is gated on the OPENROUTER_API_KEY secret and skips
# cleanly when the secret is absent.
on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    name: live corpus eval
    runs-on: ubuntu-latest
    env:
      TURNAWARE_CLASSIFIER_MODEL: google/gemini-3.1-flash-lite
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install TurnAware
        run: pip install .
      - name: Run live corpus eval
        # The secret is scoped to this step only, so the install step above
        # never sees it.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "No OPENROUTER_API_KEY secret -- skipping live eval."
            exit 0
          fi
          python3 scripts/live_eval.py
